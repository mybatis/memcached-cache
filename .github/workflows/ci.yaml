name: Java CI

on: [workflow_dispatch, push, pull_request]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        cache: [maven]
        distribution: [temurin]
        java: [21, 25, 26-ea]
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
      max-parallel: 9
    name: Test JDK ${{ matrix.java }}, ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install memcached (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y memcached
          memcached -d
      - name: Install memcached (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install memcached
          memcached -d
      - name: Install memcached (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install memcached -y --no-progress
          $memcachedExe = 'C:\ProgramData\chocolatey\lib\memcached\tools\memcached.exe'
          if (-not (Test-Path $memcachedExe)) {
            Write-Error "memcached.exe not found at expected path after choco install"
            exit 1
          }
          Start-Process -FilePath $memcachedExe -WindowStyle Hidden
          Start-Sleep -Seconds 2
          exit 0
      - name: Setup Java ${{ matrix.java }} ${{ matrix.distribution }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          cache: ${{ matrix.cache }}
          distribution: ${{ matrix.distribution }}
          java-version: ${{ matrix.java }}
      - name: Test with Maven
        run: ./mvnw test --batch-mode --no-transfer-progress --show-version -D"license.skip=true"
        if: runner.os != 'Windows'
      - name: Test with Maven (Windows)
        run: mvnw.cmd test --batch-mode --no-transfer-progress --show-version "-Dlicense.skip=true"
        if: runner.os == 'Windows'
